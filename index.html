<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adulting 2.0: The 24-Month Challenge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <header>
            <div class="top-nav">
                <h2 id="month-display">Month 1 / 24</h2>
                <div id="happiness-zone">
                    <span>Mood:</span>
                    <div class="progress-bg"><div id="happiness-bar"></div></div>
                </div>
            </div>
            <div class="stats-bar">
                <div class="stat-box">Bank: <span id="bank-balance">$0</span></div>
                <div class="stat-box">Debt: <span id="debt-balance">$0</span></div>
                <div class="stat-box">Net Income: <span id="income-display">$0</span></div>
            </div>
        </header>

        <main id="setup-screen">
            <div class="card">
                <h3>Select Profession & Lifestyle</h3>
                <label>Career:</label>
                <select id="career-select"></select>
                
                <label>Housing:</label>
                <select id="housing-select">
                    <option value="2000" data-h="20">Studio Apt ($2,000)</option>
                    <option value="900" data-h="5">Shared House ($900)</option>
                    <option value="0" data-h="-15">Parents ($0)</option>
                </select>

                <label>Car Loan (Principal):</label>
                <input type="number" id="car-principal" value="20000" step="1000">
                <p class="small">4.5% APR / 5 Year Term</p>
                
                <button id="start-btn">Begin Simulation</button>
            </div>
        </main>

        <main id="sim-screen" class="hidden">
            <div class="game-grid">
                <div class="card" id="decisions-card">
                    <h3>Monthly Opportunities</h3>
                    <p>Choose your extras for this month:</p>
                    <div id="choices-container">
                        </div>
                </div>

                <div class="card">
                    <h3>Financial Ledger</h3>
                    <div id="ledger-details" class="small"></div>
                </div>
            </div>
            
            <button id="next-month-btn">Finalize Month</button>
            <div id="event-log"></div>
        </main>

        <main id="results-screen" class="hidden">
            <div class="card">
                <h1>24-Month Retrospective</h1>
                <div id="final-stats"></div>
                <button onclick="location.reload()">Try Again</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>

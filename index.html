<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adulting 101: The Financial Sim</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <header>
            <h1>Adulting 101 <span id="month-display">Month 1</span></h1>
            <div class="stats-bar">
                <div class="stat-box">
                    <label>Bank Account</label>
                    <div id="bank-balance">$0</div>
                </div>
                <div class="stat-box">
                    <label>Credit Card Debt</label>
                    <div id="debt-balance" class="danger">$0</div>
                </div>
                <div class="stat-box">
                    <label>Happiness</label>
                    <div class="progress-bg"><div id="happiness-bar" style="width: 100%;"></div></div>
                </div>
            </div>
        </header>

        <main id="setup-screen">
            <section class="card">
                <h2>1. Choose Your Career</h2>
                <select id="career-select"></select>
                <div id="career-info"></div>
            </section>

            <section class="card">
                <h2>2. Living Situation</h2>
                <select id="housing-select">
                    <option value="2200" data-happy="20">Luxury Studio Apartment ($2,200)</option>
                    <option value="1400" data-happy="10">Modest 1-Bedroom ($1,400)</option>
                    <option value="800" data-happy="0">Room with 3 Roommates ($800)</option>
                    <option value="0" data-happy="-20">Parents' Basement ($0)</option>
                </select>
            </section>

            <section class="card">
                <h2>3. Transportation</h2>
                <select id="car-select">
                    <option value="45000" data-happy="25">New Electric Vehicle ($45k Loan)</option>
                    <option value="25000" data-happy="10">Used Reliable Sedan ($25k Loan)</option>
                    <option value="5000" data-happy="-5">"The Beater" ($5k Cash/Loan)</option>
                    <option value="100" data-happy="0">Public Transit Pass ($100/mo)</option>
                </select>
            </section>

            <button id="start-btn">Start My Adult Life</button>
        </main>

        <main id="sim-screen" class="hidden">
            <div class="action-grid">
                <div class="card">
                    <h3>Monthly Fixed Costs</h3>
                    <ul id="bill-list"></ul>
                </div>
                <div class="card">
                    <h3>Lifestyle Choices</h3>
                    <label>Food Plan:</label>
                    <select id="food-choice">
                        <option value="300" data-happy="0">Ramen & Home Cooking ($300)</option>
                        <option value="600" data-happy="15">Balanced/Groceries ($600)</option>
                        <option value="1000" data-happy="30">Dining Out/Delivery ($1,000)</option>
                    </select>
                </div>
            </div>
            
            <button id="next-month-btn">Next Month 🎲</button>
            <div id="event-log"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
